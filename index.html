<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assis Music</title>
<link rel="stylesheet" href="style.css">
</head>
<body>


<header class="top">
<h1>Assis Music</h1>
<input type="text" id="search" placeholder="Buscar música">
</header>


<main id="list">
<div class="track" onclick="play(0)">
<img src="capas/zeneto.jpg">
<div>
<strong>Largado às Traças</strong>
<span>Zé Neto & Cristiano</span>
</div>
</div>


<div class="track" onclick="play(1)">
<img src="capas/marilia.jpg">
<div>
<strong>Infiel</strong>
<span>Marília Mendonça</span>
</div>
</div>


<div class="track" onclick="play(2)">
<img src="capas/cristiano.jpg">
<div>
<strong>Cê Que Sabe</strong>
<span>Cristiano Araújo</span>
</div>
</div>
</main>


<footer class="player">
<img id="cover">
<div class="info">
<strong id="title">Escolha uma música</strong>
<span id="artist"></span>
</div>
<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()">⏯</button>
<button onclick="next()">⏭</button>
</div>
<div class="spotify-player">
<div class="controls">
<button id="prev"><i class="fas fa-step-backward"></i></button>
<button id="play-pause"><i class="fas fa-play"></i></button>
<button id="next"><i class="fas fa-step-forward"></i></button>
    </div>
    
    <div class="progress-container">
        <span id="current-time">0:00</span>
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
        <span id="duration">0:00</span>
    </div>
    
    <audio id="audio" src="sua-musica.mp3"></audio>
</div>


<script src="script.js"></script>
</body><footer class="main-player">
    <div class="now-playing-info">
        <img src="img/logo.png" alt="Capa" id="player-album-art">
        <div class="track-details">
            <h4 id="player-title">Selecione uma música</h4>
            <p id="player-artist">Assis Music</p>
        </div>
    </div>

    <div class="player-controls">
        <div class="control-buttons">
            <button id="prev-btn"><i class="fas fa-step-backward"></i></button>
            <button id="play-btn" class="play-main"><i class="fas fa-play"></i></button>
            <button id="next-btn"><i class="fas fa-step-forward"></i></button>
        </div>
        <div class="progress-wrapper">
            <span id="current-time">0:00</span>
            <div class="progress-bar-container" id="progress-container">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span id="total-duration">0:00</span>
        </div>
    </div>

    <div class="volume-container">
        <i class="fas fa-volume-up"></i>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.8">
    </div>

    <audio id="main-audio" src=""></audio>
    </footer>
  </html>
